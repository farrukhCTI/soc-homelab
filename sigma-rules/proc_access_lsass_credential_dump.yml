title: LSASS Memory Access via OpenProcess
id: a1b2c3d4-0006-4e5f-a006-argus00000006
status: test
description: Detects processes accessing LSASS memory, the primary credential dumping technique. Sysmon EID 10 captures process access events. Observed in Argus stress test (T1003.001 via Atomic Red Team). Access to lsass.exe from non-system processes is almost always malicious or investigative.
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/farrukhCTI/soc-homelab
author: Farrukh (farrukhCTI)
date: 2026-05-16
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
    filter_system:
        SourceImage|contains:
            - '\Windows\System32\csrss.exe'
            - '\Windows\System32\wininit.exe'
            - '\Windows\System32\services.exe'
            - '\Windows\System32\MsMpEng.exe'
            - '\Windows\System32\svchost.exe'
            - '\Windows\System32\taskmgr.exe'
    condition: selection and not filter_system
falsepositives:
    - Antivirus and EDR products accessing LSASS
    - Some backup solutions
    - Task Manager opened by admin (filter by SourceImage)
level: critical
fields:
    - SourceImage
    - TargetImage
    - GrantedAccess
    - CallTrace
