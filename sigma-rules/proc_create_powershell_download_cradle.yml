title: PowerShell Download Cradle via Invoke-WebRequest
id: a1b2c3d4-0002-4e5f-a002-argus00000002
status: test
description: Detects PowerShell downloading content via Invoke-WebRequest or its aliases (iwr, wget, curl). Observed in Argus stress test and IR-006 scenario — powershell.exe retrieved staged payloads from Kali HTTP server at 10.0.30.10:8080. Corroborated independently by Suricata NDR pipeline.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1105/
    - https://github.com/farrukhCTI/soc-homelab
author: Farrukh (farrukhCTI)
date: 2026-05-16
tags:
    - attack.execution
    - attack.t1059.001
    - attack.command_and_control
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - 'Invoke-WebRequest'
            - 'iwr '
            - 'wget '
            - 'curl '
            - 'DownloadFile'
            - 'DownloadString'
            - 'Net.WebClient'
    condition: selection
falsepositives:
    - Legitimate software updates using PowerShell
    - Admin scripts downloading from known internal repositories
level: high
fields:
    - CommandLine
    - ParentImage
    - ParentCommandLine
    - User
